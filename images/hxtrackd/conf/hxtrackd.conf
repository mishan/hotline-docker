# hxtrackd configuration.
#
# mhxd's bundled Hotline tracker (pre-spec HTRK v1). General defaults;
# mount your own over this to customise.

options {
	addresses 0.0.0.0;
};

tracker {
	# Servers are dropped from the listing if they haven't refreshed
	# (re-registered via UDP) within this many seconds.
	interval 360;
};

paths {
	tracker_banlist "./tracker_banlist";
};
