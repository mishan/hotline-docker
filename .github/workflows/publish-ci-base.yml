# Build the GtkHx CI base image (Fedora + all build/test deps) and push
# it to GHCR, so the GtkHx repo's CI can skip the per-run `dnf install`.
#
#   images/ci-base -> ghcr.io/<owner>/ci-base
#
# Tagged :latest, :<git-sha>, and :fedora43 (the pinned base). Rebuilt
# weekly so it absorbs Fedora security + package updates; the GtkHx CI
# still runs its own rustc-MSRV assertion against the tree, so a Fedora
# rust bump that dips below the floor fails there, not silently here.

name: publish gtkhx-ci-base

on:
  push:
    branches: [main]
    paths:
      - "images/ci-base/**"
      - ".github/workflows/publish-ci-base.yml"
  schedule:
    - cron: "0 5 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: set up docker buildx
        uses: docker/setup-buildx-action@v3

      - name: compute image ref
        id: ref
        run: |
          owner=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "repo=${REGISTRY}/${owner}/gtkhx-ci-base" >> "$GITHUB_OUTPUT"

      - name: log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: build + push gtkhx-ci-base
        uses: docker/build-push-action@v6
        with:
          context: images/ci-base
          push: true
          tags: |
            ${{ steps.ref.outputs.repo }}:latest
            ${{ steps.ref.outputs.repo }}:fedora43
            ${{ steps.ref.outputs.repo }}:${{ github.sha }}
          cache-from: type=gha,scope=gtkhx-ci-base
          cache-to: type=gha,mode=max,scope=gtkhx-ci-base
          provenance: false
